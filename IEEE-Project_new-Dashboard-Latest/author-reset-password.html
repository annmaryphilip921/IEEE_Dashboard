<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Author Password Reset - IEEE Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: linear-gradient(135deg, #5b6fd6 0%, #5f3fb8 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .reset-card {
            width: min(92vw, 460px);
            background: #ffffff;
            border-radius: 14px;
            box-shadow: 0 20px 50px rgba(15, 23, 42, 0.28);
            padding: 24px;
        }

        .reset-card h1 {
            margin: 0 0 8px 0;
            font-size: 1.4rem;
            color: #1e293b;
        }

        .reset-card p {
            margin: 0 0 16px 0;
            color: #475569;
            font-size: 0.95rem;
            line-height: 1.45;
        }

        .field-label {
            display: block;
            margin-bottom: 6px;
            color: #334155;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .field-input {
            width: 100%;
            box-sizing: border-box;
            padding: 11px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            margin-bottom: 12px;
            font-size: 0.95rem;
        }

        .field-input:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
        }

        .btn-submit {
            width: 100%;
            border: none;
            border-radius: 9px;
            background: #2563eb;
            color: white;
            padding: 11px 14px;
            font-size: 0.95rem;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-submit:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .password-wrapper {
            position: relative;
            margin-bottom: 12px;
        }

        .password-wrapper .field-input {
            padding-right: 42px;
            margin-bottom: 0;
        }

        .toggle-pw {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: #64748b;
            padding: 4px;
            display: flex;
            align-items: center;
        }

        .toggle-pw:hover {
            color: #2563eb;
        }

        .status-message {
            margin-top: 12px;
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 0.9rem;
            display: none;
        }

        .status-success {
            display: block;
            background: #dcfce7;
            color: #166534;
            border: 1px solid #86efac;
        }

        .status-error {
            display: block;
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fca5a5;
        }
    </style>
</head>
<body>
    <div class="reset-card">
        <h1>Set New Author Password</h1>
        <p>Enter your new password below to complete the author account reset.</p>

        <form id="resetPasswordForm">
            <label class="field-label" for="newPassword">New Password</label>
            <div class="password-wrapper">
                <input class="field-input" id="newPassword" type="password" minlength="8" required placeholder="Minimum 8 characters">
                <button type="button" class="toggle-pw" onclick="toggleVisibility('newPassword', this)" title="Show/hide password">
                    <svg id="eyeIcon-newPassword" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                </button>
            </div>

            <label class="field-label" for="confirmPassword">Confirm Password</label>
            <div class="password-wrapper">
                <input class="field-input" id="confirmPassword" type="password" minlength="8" required placeholder="Retype new password">
                <button type="button" class="toggle-pw" onclick="toggleVisibility('confirmPassword', this)" title="Show/hide password">
                    <svg id="eyeIcon-confirmPassword" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                </button>
            </div>

            <button class="btn-submit" id="resetSubmitBtn" type="submit">Update Password</button>
        </form>

        <div class="status-message" id="statusMessage"></div>
    </div>

    <script>
        const form = document.getElementById('resetPasswordForm');
        const submitBtn = document.getElementById('resetSubmitBtn');
        const statusMessage = document.getElementById('statusMessage');

        function toggleVisibility(fieldId, btn) {
            const input = document.getElementById(fieldId);
            const isHidden = input.type === 'password';
            input.type = isHidden ? 'text' : 'password';
            const eyeOpen  = '<path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>';
            const eyeClosed = '<path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.477 0-8.268-2.943-9.542-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.477 0 8.268 2.943 9.542 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>';
            const svg = btn.querySelector('svg');
            svg.innerHTML = isHidden ? eyeClosed : eyeOpen;
            btn.title = isHidden ? 'Hide password' : 'Show password';
        }

        function showStatus(message, type) {
            statusMessage.className = 'status-message';
            statusMessage.textContent = message;
            statusMessage.classList.add(type === 'success' ? 'status-success' : 'status-error');
        }

        function getToken() {
            const params = new URLSearchParams(window.location.search);
            return params.get('token') || '';
        }

        async function validateToken() {
            const token = getToken();
            if (!token) {
                showStatus('Invalid reset link. Missing token.', 'error');
                form.style.display = 'none';
                return false;
            }

            try {
                const response = await fetch(`/authors/forgot-password/validate?token=${encodeURIComponent(token)}`);
                const result = await response.json();
                if (!response.ok || !result.success || !result.valid) {
                    showStatus('This reset link is invalid or has expired. Please request a new one.', 'error');
                    form.style.display = 'none';
                    return false;
                }
                return true;
            } catch (_error) {
                showStatus('Failed to validate reset link. Please try again later.', 'error');
                form.style.display = 'none';
                return false;
            }
        }

        form.addEventListener('submit', async (event) => {
            event.preventDefault();

            const token = getToken();
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (newPassword.length < 8) {
                showStatus('Password must be at least 8 characters long.', 'error');
                return;
            }

            if (newPassword !== confirmPassword) {
                showStatus('Password and confirm password do not match.', 'error');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Updating...';

            try {
                const response = await fetch('/authors/forgot-password/reset', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, newPassword })
                });
                const result = await response.json();

                if (!response.ok || !result.success) {
                    throw new Error(result.message || 'Failed to reset password.');
                }

                showStatus('Password updated successfully. You can now log in with your new password.', 'success');
                form.reset();
                setTimeout(() => {
                    window.location.href = '/index.html';
                }, 1800);
            } catch (error) {
                showStatus(error.message || 'Failed to reset password.', 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Update Password';
            }
        });

        validateToken();
    </script>
</body>
</html>
